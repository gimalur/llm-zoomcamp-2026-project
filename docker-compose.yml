services:
  chat-zoom:
    build: .
    image: chat-zoom
    container_name: chat-zoom
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres-zoom:
        condition: service_healthy
    volumes:
      - ./app:/srv/app/app
      - ./scripts:/srv/app/scripts
      - ./eval:/srv/app/eval

  postgres-zoom:
    image: pgvector/pgvector:pg16
    container_name: postgres-zoom
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  grafana-zoom:
    image: grafana/grafana:11.2.0
    container_name: grafana-zoom
    env_file: .env
    ports:
      - "3001:3000"
    depends_on:
      postgres-zoom:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

volumes:
  postgres_data:
  grafana_data:
